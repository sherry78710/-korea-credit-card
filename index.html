<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>韓國刷卡快查</title>
<style>
  :root{
    --bg:#F4F5F2;
    --surface:#FFFFFF;
    --surface2:#EEF0EC;
    --ink:#1B1E22;
    --muted:#767C74;
    --line:#E2E4DE;
    --gold:#C98A2C;
    --gold-bg:#FBF1DF;

    --c-line:#06C755;
    --c-twqr-blue:#1E7FE0;
    --c-twqr-orange:#F08A1E;
    --c-twqr-red:#E5484D;
    --c-twpay:#8354E0;
    --c-quanpay:#00A896;
    --c-own:#C98A2C;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"PingFang TC","Noto Sans TC",sans-serif;
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  .mono{
    font-family:"SF Mono",ui-monospace,"Menlo","Courier New",monospace;
    font-variant-numeric:tabular-nums;
  }

  header{
    position:sticky; top:0; z-index:10;
    background:rgba(244,245,242,0.94);
    backdrop-filter:blur(8px);
    padding:14px 16px 10px;
    border-bottom:1px solid var(--line);
  }
  .title{
    font-size:13px;
    letter-spacing:.14em;
    color:var(--muted);
    text-transform:uppercase;
    font-weight:700;
    margin:0 0 10px;
  }
  .search-wrap{ position:relative; }
  #search{
    width:100%;
    padding:13px 14px;
    font-size:17px;
    border-radius:14px;
    border:1.5px solid var(--line);
    background:var(--surface);
    color:var(--ink);
    outline:none;
  }
  #search:focus{ border-color:var(--gold); }
  #search::placeholder{ color:var(--muted); }

  .chip-label{
    font-size:11px; color:var(--muted); font-weight:700;
    letter-spacing:.06em; margin:12px 2px 6px;
  }
  .chips{ display:flex; gap:8px; overflow-x:auto; padding-bottom:2px; scrollbar-width:none; }
  .chips::-webkit-scrollbar{ display:none; }
  .chip{
    flex:0 0 auto; padding:7px 13px; font-size:13.5px; font-weight:600;
    border-radius:999px; border:1px solid var(--line);
    background:var(--surface); color:var(--muted); white-space:nowrap;
  }
  .chip.active{ background:var(--ink); border-color:var(--ink); color:#fff; }
  .chip.card-chip.active{ background:var(--gold); border-color:var(--gold); color:#fff; }

  #cardSelect{
    flex:0 0 auto; -webkit-appearance:none; appearance:none;
    padding:7px 30px 7px 13px; font-size:13.5px; font-weight:600;
    border-radius:999px; border:1px solid var(--gold);
    background:var(--gold-bg) url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10"><path d="M1 3 L5 7 L9 3" stroke="%23C98A2C" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>') no-repeat right 11px center;
    background-size:10px;
    color:var(--gold); white-space:nowrap; font-family:inherit;
  }
  #cardSelect.picked{ background-color:var(--gold); color:#fff;
    background-image:url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="10" height="10" viewBox="0 0 10 10"><path d="M1 3 L5 7 L9 3" stroke="%23ffffff" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>');
  }

  .lazy-bar{
    margin:12px 16px 0; padding:10px 12px;
    background:var(--gold-bg); border:1px solid #EAD3A0; border-radius:12px;
    font-size:13px; color:var(--ink); display:flex; align-items:center; gap:8px;
  }
  .lazy-bar b{ color:var(--gold); }

  main{ padding:14px 16px 0; }

  .section-label{
    font-size:12px; letter-spacing:.12em; text-transform:uppercase;
    color:var(--muted); font-weight:700; margin:22px 2px 10px;
  }

  .empty-state{ margin-top:40px; text-align:center; color:var(--muted); font-size:14px; line-height:1.7; }
  .empty-state .big{ font-size:34px; margin-bottom:8px;}

  .store-card{
    background:var(--surface); border:1px solid var(--line); border-radius:16px;
    padding:14px 15px; margin-bottom:10px; box-shadow:0 1px 2px rgba(0,0,0,0.03);
  }
  .store-top{ display:flex; align-items:baseline; justify-content:space-between; margin-bottom:10px; }
  .store-name{ font-size:16.5px; font-weight:800; }
  .store-cat{
    font-size:11.5px; color:var(--muted); background:var(--surface2);
    padding:3px 8px; border-radius:8px; white-space:nowrap; margin-left:8px;
  }

  .rec-row{
    display:flex; align-items:flex-start; gap:10px; padding:9px 0;
    cursor:pointer; border-radius:8px;
  }
  .rec-row:active{ background:var(--surface2); }
  .rec-row + .rec-row{ border-top:1px dashed var(--line); }
  .dot{ width:10px; height:10px; border-radius:50%; margin-top:5px; flex:0 0 auto; }
  .rec-body{ flex:1; }
  .rec-top{ display:flex; align-items:baseline; justify-content:space-between; gap:8px;}
  .rec-payment{ font-size:14.5px; font-weight:700; }
  .rec-payment .chev{ color:var(--muted); font-weight:400; margin-left:3px; font-size:12px; }
  .rec-rate{ font-size:17px; font-weight:800; }
  .rec-card{ font-size:12.5px; color:var(--muted); margin-top:2px; }
  .rec-note{ font-size:11.5px; color:var(--muted); margin-top:3px; }
  .rec-label{
    font-size:10.5px; color:var(--muted); text-transform:uppercase;
    letter-spacing:.08em; margin-bottom:2px; display:block;
  }

  .info-note{ font-size:12px; color:var(--muted); line-height:1.6; margin:16px 2px 0; }

  .card-ref{
    background:var(--surface); border:1px solid var(--line); border-radius:14px;
    margin-bottom:9px; overflow:hidden;
  }
  .card-ref summary{
    padding:13px 15px; display:flex; align-items:center; justify-content:space-between;
    font-weight:700; font-size:14.5px; cursor:pointer; list-style:none;
  }
  .card-ref summary::-webkit-details-marker{ display:none; }
  .card-ref summary .arrow{ color:var(--muted); font-size:13px; transition:transform .2s; }
  .card-ref[open] summary .arrow{ transform:rotate(90deg); }
  .card-ref .body{ padding:0 15px 15px; font-size:13px; color:var(--muted); line-height:1.7; }
  .badge-free{
    font-size:10.5px; background:var(--gold-bg); color:var(--gold);
    border:1px solid #EAD3A0; padding:2px 7px; border-radius:7px;
    margin-left:8px; font-weight:700;
  }
  .badge-todo{
    font-size:10.5px; background:#FDEDEC; color:#C0392B;
    border:1px solid #F2C4BF; padding:2px 7px; border-radius:7px;
    margin-left:8px; font-weight:700;
  }
  .card-todo{
    margin-top:8px; font-size:12.5px; line-height:1.6; color:#9A3B36;
    background:#FDEDEC; border-radius:9px; padding:8px 10px;
  }
  .rate-highlight{ color:var(--ink); font-weight:700; }

  footer{ text-align:center; color:var(--muted); font-size:11px; margin:30px 0 10px; padding:0 20px; line-height:1.6; }

  /* ---- detail modal ---- */
  #overlay{
    position:fixed; inset:0; background:rgba(20,20,18,0.45);
    display:none; align-items:flex-end; z-index:100;
  }
  #overlay.open{ display:flex; }
  #sheet{
    background:var(--surface);
    width:100%;
    max-height:82vh;
    border-radius:20px 20px 0 0;
    padding:18px 18px 26px;
    overflow-y:auto;
    box-shadow:0 -6px 24px rgba(0,0,0,0.15);
  }
  .sheet-head{ display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:4px; }
  .sheet-title{ display:flex; align-items:center; gap:9px; }
  .sheet-dot{ width:12px; height:12px; border-radius:50%; }
  .sheet-title h2{ font-size:19px; margin:0; font-weight:800; }
  .sheet-close{
    width:30px; height:30px; border-radius:50%; border:none;
    background:var(--surface2); color:var(--muted); font-size:16px;
    display:flex; align-items:center; justify-content:center; cursor:pointer;
  }
  .sheet-period{ font-size:12px; color:var(--muted); margin:2px 0 14px; }
  .sheet-section{ margin-bottom:16px; }
  .sheet-section h3{
    font-size:11px; text-transform:uppercase; letter-spacing:.08em;
    color:var(--gold); margin:0 0 8px; font-weight:800;
  }
  .sheet-section ul{ margin:0; padding-left:18px; }
  .sheet-section li{ font-size:13.5px; line-height:1.7; margin-bottom:4px; }
  .sheet-steps{ margin:0; padding-left:20px; }
  .sheet-steps li{ font-size:13.5px; line-height:1.7; margin-bottom:8px; padding-left:2px; }
  .sheet-steps li::marker{ color:var(--gold); font-weight:800; }
  .sheet-section p{ font-size:13.5px; line-height:1.7; margin:0; color:var(--ink); }
  .sheet-note{
    font-size:12px; color:var(--muted); background:var(--surface2);
    border-radius:10px; padding:10px 12px; line-height:1.6; margin-top:4px;
  }
  .sheet-myfit{
    font-size:13px; line-height:1.6; border-radius:10px;
    padding:11px 12px; margin-bottom:14px; font-weight:500;
  }
  .sheet-myfit b{ display:block; font-size:11px; text-transform:uppercase;
    letter-spacing:.06em; margin-bottom:4px; font-weight:800; }
  .sheet-myfit.good{ background:#EAF7EE; color:#1E6B3A; }
  .sheet-myfit.good b{ color:#1E9E4C; }
  .sheet-myfit.warn{ background:#FDEDEC; color:#9A3B36; }
  .sheet-myfit.warn b{ color:#E5484D; }
  .sheet-code{
    display:inline-block; margin-top:6px; font-size:12.5px;
    background:var(--gold-bg); color:var(--gold); border:1px solid #EAD3A0;
    padding:4px 10px; border-radius:8px; font-weight:700;
  }
</style>
</head>
<body>

<header>
  <p class="title">韓國刷卡快查</p>
  <div class="search-wrap">

  </div>

  <div class="chips" id="chips"></div>
</header>

<div class="lazy-bar">🃏 找不到店家？無腦刷 <b>富邦J卡 3%起</b>，登錄後6%，暑期刷滿70萬韓元再+5%</div>

<main>
  <div id="results"></div>

  <p class="section-label">我的 8 張卡・海外/韓國回饋總表</p>

  <footer>資料整理自 2026 韓國購物回饋文章＋各銀行/支付官網公告，實際回饋、名額與活動期限請以當下公告為準。</footer>
</main>

<div id="overlay">
  <div id="sheet"></div>
</div>

const chipsEl = document.getElementById('chips');
const resultsEl = document.getElementById('results');
const searchEl = document.getElementById('search');
const cardRefEl = document.getElementById('cardRef');
const overlayEl = document.getElementById('overlay');
const sheetEl = document.getElementById('sheet');
let activeCat = '全部';
let activeCard = null;

function normalize(s){ return s.toLowerCase().replace(/\s+/g,''); }

function groupHasCard(group, cardKey){
  const all = group.primary.concat(group.backup || []);
  return all.some(r => r.cardKeys && r.cardKeys.includes(cardKey));
}

function recRowHtml(r, label){
  const cardLine = r.card ? `<div class="rec-card">${r.card}</div>` : '';
  const noteLine = r.note ? `<div class="rec-note">${r.note}</div>` : '';
  return `
    <div class="rec-row" onclick="openDetail('${r.pay.key}')">
      <div class="dot" style="background:${r.pay.color}"></div>
      <div class="rec-body">
        ${label ? `<span class="rec-label">${label}</span>` : ''}
        <div class="rec-top">
          <span class="rec-payment">${r.pay.label}<span class="chev">›</span></span>
          <span class="rec-rate mono">${r.rate}</span>
        </div>
        ${cardLine}
        ${noteLine}
      </div>
    </div>`;
}

function storeCardHtml(store){
  const g = GROUPS[store.group];
  let html = `<div class="store-card">
    <div class="store-top">
      <span class="store-name">${store.name}</span>
      <span class="store-cat">${store.cat}</span>
    </div>`;
  g.primary.forEach((r,i)=>{ html += recRowHtml(r, i===0 ? '首選' : ''); });
  if(g.backup){
    g.backup.forEach((r,i)=>{ html += recRowHtml(r, i===0 ? '備用' : ''); });
  }
  html += `</div>`;
  return html;
}

function render(){
  const q = normalize(searchEl.value);
  let list = STORES;

  if(activeCat !== '全部'){
    list = list.filter(s => s.cat === activeCat);
  }
  if(activeCard){
    list = list.filter(s => groupHasCard(GROUPS[s.group], activeCard));
  }
  if(q){
    list = list.filter(s=>{
      const hay = normalize(s.name + ' ' + s.alias + ' ' + s.cat);
      return hay.includes(q);
    });
  }

  if(list.length === 0){
    resultsEl.innerHTML = `<div class="empty-state">
      <div class="big">🔍</div>
      找不到符合的店家<br>用上面的「懶人無腦卡」就對了
    </div>`;
    return;
  }
  resultsEl.innerHTML = list.map(storeCardHtml).join('');
}

CATS.forEach(c=>{
  const el = document.createElement('div');
  el.className = 'chip' + (c==='全部' ? ' active' : '');
  el.textContent = c;
  el.onclick = ()=>{
    document.querySelectorAll('#chips .chip').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    activeCat = c;
    render();
  };
  chipsEl.appendChild(el);
});

const allCardEl = document.createElement('select');
allCardEl.id = 'cardSelect';
const opt0 = document.createElement('option');
opt0.value = '';
opt0.textContent = '我的信用卡';
allCardEl.appendChild(opt0);
CARDS.forEach(c=>{
  const opt = document.createElement('option');
  opt.value = c.key;
  opt.textContent = c.name;
  allCardEl.appendChild(opt);
});
allCardEl.onchange = ()=>{
  activeCard = allCardEl.value || null;
  allCardEl.classList.toggle('picked', !!activeCard);
  render();
};
chipsEl.insertBefore(allCardEl, chipsEl.firstChild);

searchEl.addEventListener('input', render);
render();

cardRefEl.innerHTML = CARDS.map(c=>`
  <details class="card-ref">
    <summary>
      <span>${c.name}${c.todo ? '<span class="badge-todo">要動作</span>' : (c.free ? '<span class="badge-free">免登錄</span>' : '')}</span>
      <span class="arrow">▸</span>
    </summary>
    <div class="body">
      <div class="rate-highlight mono" style="margin-bottom:6px;font-size:15px;">${c.rate}</div>
      ${c.detail}
      ${c.todo ? `<div class="card-todo">⚑ ${c.todo}</div>` : ''}
    </div>
  </details>
`).join('');

// ---- detail sheet ----
function openDetail(payKey){
  const p = PAY[payKey];
  const d = PAY_DETAIL[payKey];
  if(!p || !d) return;

  let html = `
    <div class="sheet-head">
      <div class="sheet-title">
        <div class="sheet-dot" style="background:${p.color}"></div>
        <h2>${p.label}</h2>
      </div>
      <button class="sheet-close" onclick="closeDetail()">✕</button>
    </div>
    <div class="sheet-period">${d.period}</div>
    ${d.myMax ? `<div class="sheet-myfit good"><b>✓ 依妳的卡／帳戶</b>${d.myMax}</div>` : ''}

    <div class="sheet-section">
      <h3>回饋內容（妳實際能拿）</h3>
      <ul>${d.breakdown.map(b=>`<li>${b}</li>`).join('')}</ul>
    </div>

    ${d.steps ? `<div class="sheet-section">
      <h3>怎麼參加、怎麼領</h3>
      <ol class="sheet-steps">${d.steps.map(s=>`<li>${s}</li>`).join('')}</ol>
    </div>` : ''}

    <div class="sheet-section">
      <h3>適用店家</h3>
      <p>${d.stores}</p>
    </div>
  `;
  if(d.note){
    html += `<div class="sheet-note">ⓘ ${d.note}</div>`;
  }

  sheetEl.innerHTML = html;
  overlayEl.classList.add('open');
}
function closeDetail(){ overlayEl.classList.remove('open'); }
overlayEl.addEventListener('click', (e)=>{ if(e.target === overlayEl) closeDetail(); });
</script>
